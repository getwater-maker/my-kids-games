<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛있는 밥 만들기 🍚</title>
    <link rel="stylesheet" href="rice.css">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="game-header">
            <h1>🍚 맛있는 밥 만들기</h1>
            <div class="actions">
                <button onclick="location.href='index.html'" class="action-btn">⬅️ 뒤로가기</button>
                <button id="clearBtn" class="action-btn clear-btn">🗑️ 새 그릇</button>
                <button id="saveBtn" class="action-btn save-btn">📸 사진 저장!</button>
            </div>
        </header>

        <main class="main-content">
            <!-- Left Toolbar -->
            <aside class="sidebar">
                <div class="panel">
                    <h2>🍚 밥 푸기</h2>
                    <p class="hint-text">그릇을 클릭해서 밥을 담아요!</p>
                    <div class="tool-list">
                        <button class="tool-btn active" data-tool="rice" data-val="white">🍚 흰쌀밥</button>
                        <button class="tool-btn" data-tool="rice" data-val="black">🍙 흑미밥</button>
                        <button class="tool-btn" data-tool="rice" data-val="mixed">🌾 잡곡밥</button>
                    </div>
                </div>

                <div class="panel">
                    <h2>🥓 밥도둑 반찬</h2>
                    <p class="hint-text">밥 위에 맛있는 반찬을 올려요!</p>
                    <div class="sticker-list">
                        <button class="tool-btn sticker-btn" data-tool="topping" data-val="스팸">🥓 스팸</button>
                        <button class="tool-btn sticker-btn" data-tool="topping" data-val="계란">🍳 계란후라이</button>
                        <button class="tool-btn sticker-btn" data-tool="topping" data-val="김">⬛ 김</button>
                        <button class="tool-btn sticker-btn" data-tool="topping" data-val="참치">🐟 참치</button>
                        <button class="tool-btn sticker-btn" data-tool="topping" data-val="명란">🐡 명란젓</button>
                        <button class="tool-btn sticker-btn" data-tool="topping" data-val="김치">🌶️ 김치</button>
                    </div>
                </div>

                <div class="panel">
                    <h2>🧂 소스와 가루</h2>
                    <p class="hint-text">드래그해서 소스를 뿌려요!</p>
                    <div class="tool-list">
                        <button class="tool-btn" data-tool="sauce" data-color="#3c2218" data-size="10">🤎 간장</button>
                        <button class="tool-btn" data-tool="sauce" data-color="#e84118" data-size="15">❤️ 고추장</button>
                        <button class="tool-btn" data-tool="sauce" data-color="#e1b12c" data-size="8">💛 참기름</button>
                        <button class="tool-btn" data-tool="powder" data-color="#f5f6fa">🧂 통깨</button>
                        <button class="tool-btn" data-tool="powder" data-color="#2f3640">🖤 검은깨</button>
                        <button class="tool-btn" data-tool="powder" data-color="#4cd137">🌿 파가루</button>
                    </div>
                </div>
            </aside>

            <!-- Center Stage -->
            <section class="preview-area">
                <div class="bowl-wrapper">
                    <!-- The Bowl Background -->
                    <div class="bowl-back"></div>

                    <!-- The Canvas where rice and toppings go -->
                    <canvas id="riceCanvas" width="400" height="350"></canvas>

                    <!-- The Bowl Front (overlaps canvas for 3D effect) -->
                    <div class="bowl-front"></div>

                    <div id="cursorHint" class="cursor-hint">🍚</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Sounds -->
    <audio id="sfx-scoop" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="sfx-squish" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script src="rice.js"></script>
</body>

</html>

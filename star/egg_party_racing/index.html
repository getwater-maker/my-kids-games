<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGG PARTY: COLORFUL RACING 🥚</title>
    <style>
        body { margin: 0; background: #fffbe6; overflow: hidden; font-family: 'Jua', sans-serif; }
        canvas { display: block; background: linear-gradient(to bottom, #74b9ff, #81ecec); }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px #000; font-size: 28px; pointer-events: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ff7675; text-align: center; }
        .btn-start { padding: 15px 50px; font-size: 28px; background: #fab1a0; border: none; color: #fff; cursor: pointer; border-radius: 20px; margin-top: 20px; box-shadow: 0 5px #e17055; transition: 0.2s; }
        .btn-start:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="ui">LAP: 1/3</div>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
        <h1 style="font-size: 70px;">EGG PARTY</h1>
        <p style="font-size: 24px; color: #2d3436;">귀여운 달걀들의 질주!<br>마우스로 방향을 조절하세요.<br>다른 달걀들을 제치고 1등을 하세요!</p>
        <button class="btn-start" onclick="startGame()">레이스 시작!</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const overlay = document.getElementById('overlay');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let balls = [];
        let playerIndex = 0;
        let gameActive = false;
        let mouse = { x: canvas.width/2, y: canvas.height/2 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        function startGame() {
            overlay.style.display = 'none';
            balls = [];
            // Create player
            balls.push({ x: 100, y: canvas.height/2, r: 25, color: '#ffeaa7', speed: 0, targetY: canvas.height/2, progress: 0 });
            // Create NPCs
            for(let i=1; i<5; i++) {
                balls.push({ x: 100, y: (canvas.height/6)*i, r: 25, color: `hsl(${Math.random()*360}, 70%, 70%)`, speed: Math.random()*2 + 5, progress: 0 });
            }
            gameActive = true;
            gameLoop();
        }

        function gameLoop() {
            if(!gameActive) return;

            // Player logic
            let player = balls[0];
            player.targetY = mouse.y;
            player.y += (player.targetY - player.y) * 0.1;
            player.progress += 6; // Player constant speed
            
            // NPC logic
            for(let i=1; i<balls.length; i++) {
                balls[i].progress += balls[i].speed;
                // Add some randomness
                balls[i].speed += (Math.random() - 0.5) * 0.2;
                if(balls[i].speed < 4) balls[i].speed = 4;
                if(balls[i].speed > 8) balls[i].speed = 8;
            }

            // check win
            if(player.progress > canvas.width * 5) winGame();
            else if(balls.some((b, i) => i > 0 && b.progress > canvas.width * 5)) loseGame();

            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);

            // Draw Track lines
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.setLineDash([20, 20]);
            for(let i=1; i<6; i++) {
                ctx.beginPath();
                ctx.moveTo(0, (canvas.height/6)*i);
                ctx.lineTo(canvas.width, (canvas.height/6)*i);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            // Draw Balls
            balls.forEach((b, i) => {
                let displayX = (b.progress % canvas.width);
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.beginPath();ctx.ellipse(displayX, b.y + 20, b.r, b.r/3, 0, 0, Math.PI*2);ctx.fill();

                // Egg body
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.ellipse(displayX, b.y, b.r, b.r * 1.2, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Face
                ctx.fillStyle = '#2d3436';
                ctx.beginPath();
                ctx.arc(displayX - 8, b.y - 5, 3, 0, Math.PI*2);
                ctx.arc(displayX + 8, b.y - 5, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(displayX, b.y + 5, 5, 0, Math.PI);
                ctx.stroke();

                if(i === 0) {
                    ctx.fillStyle = '#ff7675';
                    ctx.font = 'bold 20px Arial';
                    ctx.fillText("YOU", displayX - 20, b.y - 45);
                }
            });

            // Distance marker
            ui.innerText = "GOAL: " + Math.floor((balls[0].progress / (canvas.width*5)) * 100) + "%";
        }

        function winGame() {
            gameActive = false;
            overlay.style.display = 'flex';
            overlay.innerHTML = '<h1 style="color:#2ecc71">VICTORY!</h1><p>당신이 1등입니다! 에그 파티의 주인공!</p><button class="btn-start" onclick="startGame()">다시 달리기</button>';
        }

        function loseGame() {
            gameActive = false;
            overlay.style.display = 'flex';
            overlay.innerHTML = '<h1 style="color:#ff7675">DEFEAT</h1><p>아쉽게도 순위권 밖입니다...<br>더 빨리 달려보세요!</p><button class="btn-start" onclick="startGame()">다시 달리기</button>';
        }

    </script>
</body>
</html>

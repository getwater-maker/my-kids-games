<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>GHOST SQUID GAME: RED LIGHT 🚦</title>
    <style>
        body { margin:0; background:#111; color:#fff; font-family:sans-serif; overflow:hidden; }
        #doll { width:100px; height:150px; background:#f00; margin: 50px auto; transition: 0.5s; }
        #player { position:absolute; bottom:20px; left:50%; width:40px; height:40px; background:#0f0; transform:translateX(-50%); }
        #status { font-size:40px; text-align:center; padding:20px; }
    </style>
</head>
<body>
    <div id="status">GO!</div>
    <div id="doll">👹</div>
    <div id="player"></div>
    <script>
        let state = 'GO';
        let py = 0;
        const p = document.getElementById('player');
        const d = document.getElementById('doll');
        const s = document.getElementById('status');

        function toggle() {
            if(state === 'GO') { state='STOP'; d.style.background='#f00'; s.innerText='무궁화 꽃이...'; s.style.color='#f00'; }
            else { state='GO'; d.style.background='#0f0'; s.innerText='피었습니다!'; s.style.color='#0f0'; }
            setTimeout(toggle, Math.random()*2000 + 1000);
        }
        toggle();

        window.addEventListener('keydown', e => {
            if(e.code === 'Space') {
                if(state === 'STOP') { alert('DEATH!'); location.reload(); return; }
                py += 10;
                p.style.bottom = (20 + py) + 'px';
                if(py > 400) { alert('SURVIVED!'); location.reload(); }
            }
        });
    </script>
</body>
</html>

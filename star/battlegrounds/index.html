<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배틀그라운드: 서바이벌 아레나 (Battlegrounds 3D)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <div id="game-container">
        <!-- Crosshair -->
        <div id="crosshair"></div>

        <!-- HUD -->
        <div id="hud">
            <!-- Top: Zone Info -->
            <div id="zone-status">
                <div class="label">🔵 NEXT ZONE IN</div>
                <div id="timer-val">02:00</div>
            </div>

            <!-- Bottom Left: Health -->
            <div id="player-status">
                <div class="hp-bar-container">
                    <div id="hp-bar-fill"></div>
                </div>
                <div class="hp-values">HP <span id="current-hp">100</span> / 100</div>
            </div>

            <!-- Bottom Right: Ammo & Kills -->
            <div id="combat-status">
                <div id="kill-counter">KILLS: <span id="kill-val">0</span></div>
                <div id="ammo-count"><span id="current-ammo">30</span> / 180</div>
            </div>
        </div>

        <!-- Overlays -->
        <div id="overlay" class="overlay">
            <div class="menu-box">
                <h1 class="logo-text">WINNER WINNER<span>CHICKEN DINNER!</span></h1>
                <p>Survive the blue zone and eliminate all enemies!</p>
                <div class="controls-guide">WASD: MOVE | CLICK: SHOOT | R: RELOAD | SHIFT: SPRINT</div>
                <button id="start-btn">DROP TO ISLAND</button>
            </div>
        </div>

        <div id="game-over" class="overlay hidden">
            <div class="menu-box">
                <h1 id="end-title" class="logo-text">ELIMINATED</h1>
                <p>Better luck next time!</p>
                <div class="stats">
                    <p>Kills: <span id="final-kills">0</span></p>
                </div>
                <button id="restart-btn">RETURN TO LOBBY</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>

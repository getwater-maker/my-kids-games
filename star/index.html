<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>star - Coming Soon! ⭐</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Jua', sans-serif;
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
            background-image: radial-gradient(rgba(255, 255, 255, 0.3) 2px, transparent 2px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border: 4px solid #fdcb6e;
            max-width: 450px;
            width: 90%;
        }

        .star-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 15px;
            animation: spin 3s ease-in-out infinite;
        }

        @keyframes spin {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(15deg) scale(1.1); }
        }

        h1 {
            font-size: 2rem;
            color: #2d3436;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.2rem;
            color: #636e72;
            margin-bottom: 25px;
        }

        .back-btn {
            display: inline-block;
            font-family: 'Jua', sans-serif;
            font-size: 1.2rem;
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #fdcb6e;
            color: #2d3436;
            text-decoration: none;
            box-shadow: 0 4px 0 #e17055;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .back-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <span class="star-icon">⭐</span>
        <h1>star의 게임 준비 중!</h1>
        <p>곧 멋진 게임이 올라올 거예요!</p>
        <a href="../" class="back-btn">🏠 홈으로 돌아가기</a>
    </div>
</body>

</html>

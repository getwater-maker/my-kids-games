<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>커비 만들기 시뮬레이터</title>
    <link rel="stylesheet" href="style.css">
    <!-- Matter.js 물리 엔진 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>

<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="score-board">점수: <span id="score">0</span></div>
            <div id="next-preview">다음: <div id="next-kirby"></div>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>

        <!-- 게임 오버 화면 -->
        <div id="game-over" class="overlay hidden">
            <div class="message-box">
                <h1>GAME OVER</h1>
                <p>커비가 넘쳐버렸어요!</p>
                <div class="final-score">최종 점수: <span id="final-score">0</span></div>
                <button onclick="location.reload()">다시 하기</button>
            </div>
        </div>

        <!-- 승리 화면 -->
        <div id="game-win" class="overlay hidden">
            <div class="message-box win">
                <h1>🎉 우와! 🎉</h1>
                <p>7단계 궁극의 커비를 만들었어요!</p>
                <div class="final-score">최종 점수: <span id="win-score">0</span></div>
                <button onclick="location.reload()">한 번 더!</button>
            </div>
        </div>

        <div id="back-btn">
            <a href="../index.html">메뉴로 돌아가기</a>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>

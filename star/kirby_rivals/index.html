<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIRBY RIVALS 🏆</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- HUD -->
        <div id="hud">
            <div id="player-status" class="status-box">
                <div class="name">PLAYER 1</div>
                <div class="hp-bar-outer">
                    <div id="player-hp-bar" class="hp-bar shadow"></div>
                </div>
                <div class="super-bar-outer">
                    <div id="player-super-bar" class="super-bar"></div>
                </div>
            </div>

            <div id="timer-box">
                <span id="round-timer">99</span>
            </div>

            <div id="enemy-status" class="status-box right">
                <div class="name">CPU BOT</div>
                <div class="hp-bar-outer">
                    <div id="enemy-hp-bar" class="hp-bar shadow"></div>
                </div>
                <div class="super-bar-outer">
                    <div id="enemy-super-bar" class="super-bar"></div>
                </div>
            </div>
        </div>

        <!-- Canvas -->
        <canvas id="game-canvas" width="800" height="450"></canvas>

        <!-- Screens -->
        <div id="start-screen" class="screen active">
            <h1>KIRBY RIVALS</h1>
            <p>1 VS 1 격투 게임입니다! 조작법: WASD 이동(공중부양), J 펀치, K 킥, L 가드, SPACE 궁극기</p>
            <div style="display: flex; gap: 20px;">
                <button id="start-btn" class="btn">게임 시작 (START)</button>
                <button class="btn" style="background: #333; color: white;" onclick="location.href='../index.html'">메뉴로
                    돌아가기</button>
            </div>
        </div>

        <div id="round-over-screen" class="screen">
            <h1 id="round-result-msg">ROUND FINISHED</h1>
            <button id="next-round-btn" class="btn">NEXT ROUND</button>
        </div>

        <div id="game-over-screen" class="screen">
            <h1 id="final-result-msg">GAME FINISHED!</h1>
            <div style="display: flex; gap: 20px;">
                <button id="restart-btn" class="btn">다시 시작 (REMATCH)</button>
                <button class="btn" style="background: #333; color: white;"
                    onclick="location.href='../index.html'">메뉴로</button>
            </div>
        </div>

        <div id="announcement">FIGHT!</div>
    </div>

    <!-- Background music is typically external, but we'll focus on visual effects -->
    <script src="js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>SMILING CRITTERS: CATNAP SMOKE 💜</title>
    <style>
        body { margin:0; background:#2c003e; overflow:hidden; }
        #smoke { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(142, 68, 173, 0.4); pointer-events:none; }
        #flashlight { position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at center, transparent 80px, #1a001a 220px); pointer-events:none; }
        .item { position:absolute; width:40px; height:40px; background:#f1c40f; border-radius:50%; cursor:pointer; }
    </style>
</head>
<body>
    <div id="smoke"></div>
    <div id="flashlight"></div>
    <div id="ui" style="position:absolute; top:20px; width:100%; text-align:center; color:#fff; font-size:24px;">보라색 연기가 퍼지기 전에 노란 별을 5개 찾으세요!</div>
    <div id="game"></div>
    <script>
        let found = 0;
        function spawn() {
            let i = document.createElement('div'); i.className='item';
            i.style.left = Math.random()*90 + '%'; i.style.top = Math.random()*80 + 10 + '%';
            i.onclick = () => { found++; document.body.removeChild(i); if(found<5) spawn(); else alert('CATNAP IS DEFEATED!'); };
            document.body.appendChild(i);
        }
        window.addEventListener('mousemove', e => {
            document.getElementById('flashlight').style.background = `radial-gradient(circle at ${e.clientX}px ${e.clientY}px, transparent 80px, #1a001a 220px)`;
        });
        spawn();
        setTimeout(() => { if(found<5) alert('SLEEP FOREVER...'); location.reload(); }, 20000);
    </script>
</body>
</html>

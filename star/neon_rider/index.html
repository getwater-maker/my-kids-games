<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON RIDER: Gravity Defied</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Matter.js Physics Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="hud">
            <div class="top-row">
                <div id="stage-info">STAGE 1</div>
                <div id="score">SCORE: 0 / 1000</div>
                <div id="best">BEST: 0</div>
            </div>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="gems">💎 <span id="gem-count">0</span></div>
        </div>

        <div id="overlay" class="overlay">
            <div class="menu">
                <h1 class="neon-text">NEON RIDER</h1>
                <p>HOLD TO DRIVE & FLIP</p>
                <button id="start-btn">START RACE</button>
            </div>
        </div>

        <div id="death-screen" class="overlay hidden">
            <div class="menu">
                <h1 class="death-text">CRASHED!</h1>
                <p id="final-score">SCORE: 0</p>
                <button id="restart-btn">TRY AGAIN</button>
            </div>
        </div>

        <div id="win-screen" class="overlay hidden">
            <div class="menu">
                <h1 class="win-text">STAGE CLEAR!</h1>
                <p id="stage-clear-msg">Level 1 Complete</p>
                <button id="next-stage-btn">NEXT STAGE</button>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>SQUISHY STRESS BALL 🧶</title>
    <style>
        body { margin:0; background:#f5f5f5; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; font-family:sans-serif; }
        #ball { width:200px; height:200px; background:radial-gradient(circle at 30% 30%, #4dabf7, #1c7ed6); border-radius:50%; cursor:pointer; transition: 0.05s; }
        #ball:active { transform: scale(0.6, 1.3); filter: brightness(1.2); }
    </style>
</head>
<body>
    <h1>SQUISHY BALL</h1>
    <p>공을 꾹꾹 주무르며 스트레스를 푸세요!</p>
    <div id="ball"></div>
    <script>
        const ball = document.getElementById('ball');
        ball.onmousedown = () => { if(navigator.vibrate) navigator.vibrate([10, 30, 10]); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커비 혼돈의 젠가</title>
    <link rel="stylesheet" href="style.css">
    <!-- 3D Physics & Visuals -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
</head>

<body>
    <div id="game-container">
        <!-- HUD -->
        <div id="hud">
            <div id="timer-box">60</div>
            <div id="survivor-box">생존자: <span id="survivor-count">15</span>/15</div>
        </div>

        <div id="announcement"></div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1>커비 혼돈의 젠가</h1>
            <p>시작 시 <strong>파괴자</strong>와 <strong>생존자</strong> 중 역할이 랜덤으로 배정됩니다!<br>파괴자(3D): 젠가 블록을 클릭해 탑을
                무너뜨리세요.<br>생존자(노란 커비): 방향키(WASD)와 점프(Space)로 살아남으세요!</p>
            <button id="start-btn" class="btn">역할 추첨 후 시작</button>
            <button class="btn" onclick="location.href='../index.html'">메인화면으로</button>
        </div>

        <!-- End Screens -->
        <div id="game-over-screen" class="screen">
            <h1 id="result-title">게임 종료</h1>
            <p id="result-desc"></p>
            <button id="restart-btn" class="btn">다시 하기</button>
            <button class="btn" onclick="location.href='../index.html'">메인화면으로</button>
        </div>
    </div>

    <!-- 3D WebGL Canvas goes here (generated by Three.js) -->

    <script src="js/main.js"></script>
</body>

</html>

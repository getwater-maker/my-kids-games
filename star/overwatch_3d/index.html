<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERWATCH 3D: Hero Strike</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- Three.js Library -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <div id="game-container">
        <!-- Crosshair -->
        <div id="crosshair"></div>

        <!-- HUD Overlay -->
        <div id="hud">
            <!-- Left Side: Character Portrait & Health -->
            <div id="player-status">
                <div class="portrait-box">
                    <div class="portrait">👤</div>
                </div>
                <div class="health-box">
                    <div class="hp-label">SOLDIER: 76</div>
                    <div class="hp-bar-container">
                        <div id="hp-bar-fill"></div>
                    </div>
                    <div class="hp-values"><span id="current-hp">200</span> / 200</div>
                </div>
            </div>

            <!-- Center: Ultimate Charge -->
            <div id="ultimate-container">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" class="bg-circle"></circle>
                    <circle cx="50" cy="50" r="45" id="ult-progress-circle"></circle>
                </svg>
                <div class="ult-label">ULT</div>
                <div id="ult-percent">0%</div>
            </div>

            <!-- Right Side: Abilities & Ammo -->
            <div id="combat-info">
                <div class="abilities">
                    <div class="ability-slot" id="ability-1">
                        <div class="cooldown-overlay"></div>
                        <div class="key">Shift</div>
                        <div class="icon">🏃</div>
                    </div>
                    <div class="ability-slot" id="ability-2">
                        <div class="cooldown-overlay"></div>
                        <div class="key">E</div>
                        <div class="icon">➕</div>
                    </div>
                    <div class="ability-slot" id="ability-3">
                        <div class="cooldown-overlay"></div>
                        <div class="key">Right Click</div>
                        <div class="icon">🚀</div>
                    </div>
                </div>
                <div class="ammo-box">
                    <div id="current-ammo">25</div>
                    <div class="ammo-total">/ ∞</div>
                </div>
            </div>
        </div>

        <!-- Objective Info -->
        <div id="objective-hud">
            <div class="obj-bar">
                <div class="obj-label">CAPTURE POINT</div>
                <div class="obj-progress-bg">
                    <div id="obj-progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Kill Feed -->
        <div id="kill-feed"></div>

        <!-- Start/Death Overlays -->
        <div id="overlay" class="overlay">
            <div class="menu-box">
                <h1 class="logo-text">OVERWATCH <span>3D</span></h1>
                <p>WASD to Move | Click to Shoot | Shift: Sprint | E: Heal | R: Reload</p>
                <button id="start-btn">ENTER BATTLE</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>

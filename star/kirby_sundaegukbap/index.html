<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커비 순대국밥 만들기</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- Background -->
        <div class="bg-pattern">🍲</div>

        <h1 id="title-text">뜨끈한 뚝배기에 순대국밥 재료를 넣어주세요!</h1>

        <!-- The Pot Area -->
        <div id="pot-area">
            <div id="ttukbaegi-back">
                <div id="broth"></div>
                <div id="pot-contents"></div>
            </div>
            <div id="ttukbaegi-front"></div>
        </div>

        <!-- Ingredient Palette -->
        <div id="palette-area">
            <div class="ingredient-box">
                <div class="ingredient kirby-sundae" draggable="true" data-type="kirby-sundae">커비 순대</div>
            </div>

            <div class="ingredient-box">
                <div class="ingredient pork" draggable="true" data-type="pork">머릿고기</div>
            </div>

            <div class="ingredient-box">
                <div class="ingredient chives" draggable="true" data-type="chives">부추</div>
            </div>

            <div class="ingredient-box">
                <div class="ingredient perilla" draggable="true" data-type="perilla">들깨가루</div>
            </div>

            <div class="ingredient-box">
                <div class="ingredient shrimp" draggable="true" data-type="shrimp">새우젓</div>
            </div>

            <div class="ingredient-box">
                <div class="ingredient dadaegi" draggable="true" data-type="dadaegi">다대기</div>
            </div>
        </div>

        <!-- Actions / Controls -->
        <div id="controls-area">
            <button id="eat-btn" class="btn btn-action hidden">호로록 국밥 먹기 😋</button>
            <button id="reset-btn" class="btn" style="background:#5d4037;">다시 끓이기</button>
            <button class="btn" style="background:#555;" onclick="location.href='../index.html'">메인화면으로</button>
        </div>

        <div id="confetti-layer"></div>
    </div>

    <!-- Audio Effects -->
    <audio id="boil-sound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1e596eb4c7.mp3" preload="auto" loop
        autoplay></audio>

    <script src="js/main.js"></script>
</body>

</html>

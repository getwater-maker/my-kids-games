<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사커 컵: 월드 스트라이커 (Soccer Cup 3D)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <div id="game-container">
        <!-- HUD Overlay -->
        <div id="hud">
            <div id="score-board">
                <div class="team">SCORE <span id="score-val">0</span></div>
                <div class="timer">TIME <span id="time-val">60</span>s</div>
            </div>
            <div id="combo-box" class="hidden">COMBO x<span id="combo-val">1</span></div>
        </div>

        <!-- Overlays -->
        <div id="overlay" class="overlay">
            <div class="menu-box">
                <h1 class="logo-text">SOCCER<span>CUP</span></h1>
                <p>Drag the mouse or swipe to shoot the ball!</p>
                <div class="goal-preview">🥅⚽</div>
                <button id="start-btn">MATCH START</button>
            </div>
        </div>

        <div id="game-over" class="overlay hidden">
            <div class="menu-box">
                <h1 class="logo-text">FULL TIME!</h1>
                <div class="final-stats">
                    <p>Total Goals: <span id="final-score">0</span></p>
                    <p>Best Combo: <span id="final-combo">0</span></p>
                </div>
                <button id="restart-btn">REMATCH</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>

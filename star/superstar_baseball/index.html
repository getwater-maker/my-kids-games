<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슈퍼스타 야구 2026 (Superstar Baseball)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <div id="game-container">
        <!-- HUD -->
        <div id="hud">
            <div id="score-board">
                <div class="score-team">HIT <span id="hit-count">0</span></div>
                <div class="score-team">OUT <span id="out-count">0</span></div>
            </div>
            <div id="batter-stats">
                <div class="stat-label">SUPERSTAR BATTER</div>
                <div class="stat-value">SCORE: <span id="total-score">0</span></div>
            </div>
            <div id="combo-display" class="hidden">HOMERUN! x<span id="combo-val">1</span></div>
        </div>

        <!-- Overlays -->
        <div id="overlay" class="overlay">
            <div class="menu-box">
                <div class="logo">⚾🌟</div>
                <h1 class="logo-text">SUPERSTAR<span>BASEBALL</span></h1>
                <p>Click correctly to hit the pitch and score a Home Run!</p>
                <div class="controls-guide">CLICK / SPACE: SWING BAT</div>
                <button id="start-btn">PLAY BALL!</button>
            </div>
        </div>

        <div id="game-over" class="overlay hidden">
            <div class="menu-box">
                <h1 class="end-title">GAME SET!</h1>
                <div class="final-stats">
                    <p>Total Score: <span id="final-score">0</span></p>
                    <p>Total Hits: <span id="final-hits">0</span></p>
                </div>
                <button id="restart-btn">REMATCH</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>

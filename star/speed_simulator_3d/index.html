<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Speed Simulator - 초고속 질주</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;500;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
    <div id="game-container"></div>

    <!-- UI Overlay -->
    <div id="hud" class="hidden">
        <div class="stat-box wins-box">
            <span class="label">WINS</span>
            <span id="wins-value" class="value">0</span>
        </div>
        <div class="stat-box speed-box">
            <span class="label">SPEED</span>
            <span id="speed-value" class="value">0</span>
            <span class="unit">KM/H</span>
        </div>
        <div class="stat-box record-box">
            <span class="label">MAX RECORD</span>
            <span id="max-speed" class="value">0</span>
        </div>

        <div class="exercise-indicator">
            <div id="gauge-bar"></div>
            <div class="action-hint">TAP <span class="key">SPACE</span> TO RUN!</div>
        </div>

        <button id="pet-shop-btn" class="shop-trigger">🐶 PET SHOP</button>
    </div>

    <!-- Pet Shop Screen -->
    <div id="shop-screen" class="overlay hidden">
        <div class="glass-card shop-card">
            <h2>PET SHOP</h2>
            <div class="wins-current">Current Wins: <span id="shop-wins">0</span></div>
            <div class="pet-list">
                <div class="pet-item">
                    <span class="pet-icon">🧊</span>
                    <span class="pet-name">Slime (Speed +5%)</span>
                    <button class="buy-btn" onclick="buyPet('slime', 1)">Buy: 1 Win</button>
                </div>
                <div class="pet-item">
                    <span class="pet-icon">🐶</span>
                    <span class="pet-name">Puppy (Speed +10%)</span>
                    <button class="buy-btn" onclick="buyPet('puppy', 3)">Buy: 3 Wins</button>
                </div>
                <div class="pet-item">
                    <span class="pet-icon">🐉</span>
                    <span class="pet-name">Dragon (Speed +25%)</span>
                    <button class="buy-btn" onclick="buyPet('dragon', 10)">Buy: 10 Wins</button>
                </div>
            </div>
            <button id="close-shop" class="secondary-btn">Close Shop</button>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
        <div class="glass-card">
            <h1 class="neon-text">3D SPEED<br>SIMULATOR</h1>
            <p class="description">누구보다 빠르게! 운동할수록 당신의 한계를 뛰어넘습니다.</p>
            <div class="controls-info">
                <div class="control-item"><span>SPACE</span> 미친듯이 연타해서 속도 올리기</div>
                <div class="control-item"><span>W / A / S / D</span> 좌우 이동 및 조향</div>
            </div>
            <button id="start-btn" class="glow-btn">질주 시작</button>
        </div>
    </div>

    <!-- Win/Record Screen (Hidden by default) -->
    <div id="result-screen" class="overlay hidden">
        <div class="glass-card">
            <h2>NEW RECORD!</h2>
            <div class="final-stat">
                <span id="final-max-speed">0</span>
                <span class="unit">KM/H</span>
            </div>
            <p>당신의 근육이 불타오릅니다!</p>
            <button id="restart-btn" class="glow-btn">다시 도전</button>
            <button id="menu-btn" class="secondary-btn" onclick="location.href='../index.html'">메인 메뉴</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>

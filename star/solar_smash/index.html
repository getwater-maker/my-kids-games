<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>솔라 스매시: 플래닛 디스트로이어</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <div id="game-container">
        <!-- Destruction HUD -->
        <div id="hud">
            <div class="stats-box">
                <div class="stat">POPULATION: <span id="population">8.0B</span></div>
                <div class="stat">DESTRUCTION: <span id="destruction">0.0%</span></div>
            </div>

            <div id="weapon-selection">
                <div class="weapon-btn active" data-weapon="laser">💫 LASER</div>
                <div class="weapon-btn" data-weapon="meteor">☄️ METEOR</div>
                <div class="weapon-btn" data-weapon="missile">🚀 MISSILE</div>
                <div class="weapon-btn" data-weapon="blackhole">🕳️ BLACK HOLE</div>
            </div>
        </div>

        <!-- Overlays -->
        <div id="overlay" class="overlay">
            <div class="menu">
                <h1 class="title">SOLAR <span>SMASH</span></h1>
                <p>Choose your weapon and destroy the planet!</p>
                <button id="start-btn">BEGIN DESTRUCTION</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>

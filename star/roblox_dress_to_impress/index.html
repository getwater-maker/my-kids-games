<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRESS TO IMPRESS: ROBLOX STYLE 👗</title>
    <style>
        body { margin: 0; background: #fce4ec; font-family: 'Fredoka', sans-serif; display: flex; flex-direction: column; align-items: center; }
        #game-view { width: 400px; height: 600px; background: #fff; border: 10px solid #f06292; border-radius: 20px; position: relative; margin-top: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #character { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 200px; height: 400px; display: flex; flex-direction: column; align-items: center; }
        .body-part { border: 2px solid #333; transition: all 0.3s; }
        #head { width: 60px; height: 60px; border-radius: 50%; background: #ffe0bd; margin-bottom: 5px; }
        #torso { width: 80px; height: 120px; background: #ffe0bd; border-radius: 10px; position: relative; }
        #l-arm { position: absolute; left: -30px; top: 0; width: 30px; height: 100px; background: #ffe0bd; border-radius: 10px; }
        #r-arm { position: absolute; right: -30px; top: 0; width: 30px; height: 100px; background: #ffe0bd; border-radius: 10px; }
        #legs { display: flex; gap: 10px; }
        .leg { width: 35px; height: 120px; background: #ffe0bd; border-radius: 10px; }
        
        #wardrobe { width: 100%; max-width: 600px; background: #fff; padding: 20px; border-radius: 20px; margin: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .item { padding: 10px; background: #f8bbd0; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; color: #880e4f; transition: 0.2s; }
        .item:hover { transform: scale(1.05); background: #f48fb1; }
        #timer { font-size: 32px; color: #ad1457; margin-top: 20px; }
        #voting { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: #fff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .star { font-size: 40px; cursor: pointer; color: #444; }
        .star.active { color: #ffeb3b; }
    </style>
</head>
<body>
    <div id="timer">TIME LEFT: 60s</div>
    <div id="game-view">
        <div id="character">
            <div id="head" class="body-part"></div>
            <div id="torso" class="body-part">
                <div id="l-arm" class="body-part"></div>
                <div id="r-arm" class="body-part"></div>
            </div>
            <div id="legs">
                <div id="l-leg" class="leg body-part"></div>
                <div id="r-leg" class="leg body-part"></div>
            </div>
        </div>
        <div id="voting">
            <h1>VOTING TIME!</h1>
            <p>얼마나 예쁜가요?</p>
            <div id="stars">
                <span class="star" onclick="vote(1)">★</span>
                <span class="star" onclick="vote(2)">★</span>
                <span class="star" onclick="vote(3)">★</span>
                <span class="star" onclick="vote(4)">★</span>
                <span class="star" onclick="vote(5)">★</span>
            </div>
            <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px;">다시 하기</button>
        </div>
    </div>
    <div id="wardrobe">
        <div class="item" onclick="applyStyle('torso', '#ff4081')">🎀 핑크 티셔츠</div>
        <div class="item" onclick="applyStyle('torso', '#00bcd4')">👕 하늘 티셔츠</div>
        <div class="item" onclick="applyStyle('torso', '#333')">🖤 블랙 자켓</div>
        <div class="item" onclick="applyStyle('legs', '#ffeb3b')">🟡 노랑 바지</div>
        <div class="item" onclick="applyStyle('legs', '#4caf50')">🟢 초록 바지</div>
        <div class="item" onclick="applyStyle('legs', '#2196f3')">🔵 청바지</div>
        <div class="item" onclick="applyStyle('head', '#ad1457')">💖 핑크 머리</div>
        <div class="item" onclick="applyStyle('head', '#6d4c41')">🤎 갈색 머리</div>
        <div class="item" onclick="applyStyle('head', '#ff9800')">🧡 오렌지 머리</div>
    </div>

    <script>
        let timeLeft = 60;
        const timerEl = document.getElementById('timer');
        const votingEl = document.getElementById('voting');

        const countdown = setInterval(() => {
            timeLeft--;
            timerEl.innerText = "TIME LEFT: " + timeLeft + "s";
            if(timeLeft <= 0) {
                clearInterval(countdown);
                startVoting();
            }
        }, 1000);

        function applyStyle(part, color) {
            if(part === 'legs') {
                document.getElementById('l-leg').style.background = color;
                document.getElementById('r-leg').style.background = color;
            } else {
                document.getElementById('head').style.background = color;
                if(part === 'torso') {
                    document.getElementById('torso').style.background = color;
                    document.getElementById('l-arm').style.background = color;
                    document.getElementById('r-arm').style.background = color;
                } else {
                    document.getElementById(part).style.background = color;
                }
            }
        }

        function startVoting() {
            votingEl.style.display = 'flex';
        }

        function vote(n) {
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, i) => {
                s.classList.toggle('active', i < n);
            });
            setTimeout(() => {
                alert(n + "점으로 우승 후보가 되셨습니다! 🏆");
            }, 500);
        }
    </script>
</body>
</html>

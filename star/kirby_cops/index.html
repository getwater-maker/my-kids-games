<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경찰과 도둑 커비</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-ui">
        <div id="top-bar">
            <h1>경찰과 도둑 커비 🚔🏃</h1>
            <div id="stage-display">Stage: <span id="stage-num">1</span>/10</div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="controls-hint">
            [방향키] 또는 [W A S D] 이동 및 점프
        </div>
        <div id="game-over" class="hidden">
            <h2 id="end-message">체포되었습니다!</h2>
            <button id="retry-btn">현재 단계부터 다시 시작</button>
        </div>
        <div id="game-clear" class="hidden">
            <h2>탈출 성공! 자유의 몸입니다! 🚙💨</h2>
            <button id="home-btn" onclick="location.href='../index.html'">메인으로 돌아가기</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입양하세요! 미니</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="adopt.css">
</head>
<body>
    <div id="game-container">
        <!-- Header -->
        <header class="top-bar glass">
            <h1 class="logo">🐾 입양하세요! 미니</h1>
            <div class="money-container pulse-on-earn">
                <span class="coin-emoji">💰</span>
                <span id="money">0</span>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs glass">
            <button class="tab-btn active" data-tab="work">💼 일하기</button>
            <button class="tab-btn" data-tab="shop">🏪 알 상점</button>
            <button class="tab-btn" data-tab="pets">🏠 내 펫들</button>
        </nav>

        <!-- Content Area -->
        <main class="content-area glass">
            <!-- Work Tab -->
            <section id="work" class="tab-content active">
                <div class="work-header">
                    <h2>일을 해서 돈을 모아보세요!</h2>
                    <p>돈을 모아 귀여운 펫이 담긴 알을 살 수 있어요.</p>
                </div>
                <div class="work-area">
                    <button id="work-btn" class="action-btn giant-btn">
                        <span class="btn-icon">🖱️</span>
                        <span class="btn-text">클릭해서 일하기<br><small>(+10 💰)</small></span>
                    </button>
                    <div id="click-effects" class="effects-container"></div>
                </div>
            </section>

            <!-- Shop Tab -->
            <section id="shop" class="tab-content">
                <div class="shop-header">
                    <h2>신비한 알 상점</h2>
                    <p>어떤 펫이 나올까요? 알을 구매해보세요!</p>
                </div>
                <div class="egg-list" id="shop-container">
                    <!-- Shop items generated by JS -->
                </div>
            </section>

            <!-- Pets Tab -->
            <section id="pets" class="tab-content">
                <div class="pets-header">
                    <h2>나의 보금자리 🏡</h2>
                    <div class="pet-stats">보유 펫: <span id="pet-count">0</span> 마리</div>
                </div>
                <div id="inventory" class="pet-grid">
                    <!-- Pets and unhatched eggs generated by JS -->
                    <div class="empty-state">아직 펫이나 알이 없어요.<br>상점에서 알을 구매해보세요!</div>
                </div>
            </section>
        </main>

        <!-- Hatching Modal -->
        <div id="hatch-modal" class="modal hidden">
            <div class="modal-content glass-strong">
                <h2 id="modal-title">알을 깨우는 중...</h2>
                <div id="hatch-process" class="modal-body">
                    <div class="egg-container">
                        <div id="hatching-egg-emoji" class="hatching-emoji">🥚</div>
                        <img id="hatching-egg-img" class="hatching-img hidden" src="" alt="Egg">
                    </div>
                    <div class="progress-bar-container">
                        <div id="hatch-progress" class="progress-bar"></div>
                    </div>
                    <p class="hatch-msg">사랑으로 보살피는 중... 💖</p>
                </div>
                
                <div id="hatch-result" class="modal-body hidden">
                    <div class="sparkles-bg">✨</div>
                    <div class="pet-reveal-container">
                        <div id="hatched-pet-emoji" class="reveal-emoji">🐶</div>
                        <img id="hatched-pet-img" class="reveal-img hidden" src="" alt="Pet">
                    </div>
                    <h3 id="hatched-pet-name">강아지</h3>
                    <p id="hatched-pet-rarity" class="rarity">커먼</p>
                    <button id="close-modal-btn" class="action-btn">내 품에 안기</button>
                </div>
            </div>
        </div>
        
        <!-- Toast Notification -->
        <div id="toast" class="toast hidden">메시지</div>
    </div>
    <script src="adopt.js"></script>
</body>
</html>

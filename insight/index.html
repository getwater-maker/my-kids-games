<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마법의 색칠공부 🎨</title>
    <link rel="stylesheet" href="styles.css">
    <!-- 글씨체를 귀엽게 만들어주는 마법 지팡이! -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>🎨 마법의 색칠공부</h1>
            <div class="actions">
                <button onclick="location.href='tanghulu.html'" class="action-btn"
                    style="background-color: #ff9f43; box-shadow: 0 4px 0 #cc8e35;">🍡 탕후루</button>
                <button onclick="location.href='cake.html'" class="action-btn"
                    style="background-color: #e84393; box-shadow: 0 4px 0 #d63031;">🎂 케이크 꾸미기</button>
                <button onclick="location.href='phonecase.html'" class="action-btn"
                    style="background-color: #9c88ff; box-shadow: 0 4px 0 #8c7ae6; color: white;">📱 폰케이스 다꾸</button>
                <button onclick="location.href='donut.html'" class="action-btn"
                    style="background-color: #f6b93b; box-shadow: 0 4px 0 #e58e26; color: white;">🍩 도넛 만들기</button>
                <button onclick="location.href='bingsu.html'" class="action-btn"
                    style="background-color: #00cec9; box-shadow: 0 4px 0 #00b894; color: white;">🍧 빙수 만들기</button>
                <button onclick="location.href='smoothie.html'" class="action-btn"
                    style="background-color: #ff9ff3; box-shadow: 0 4px 0 #f368e0; color: white;">🍹 스무디 만들기</button>
                <button onclick="location.href='slipper.html'" class="action-btn"
                    style="background-color: #81ecec; box-shadow: 0 4px 0 #00cec9; color: #2d3436;">🩴 슬리퍼 꾸미기</button>
                <button onclick="location.href='pizza.html'" class="action-btn"
                    style="background-color: #fab1a0; box-shadow: 0 4px 0 #e17055; color: #d63031;">🍕 피자 만들기</button>
                <button onclick="location.href='ramen.html'" class="action-btn"
                    style="background-color: #ff6b6b; box-shadow: 0 4px 0 #ee5253; color: white;">🍜 라면 만들기</button>
                <button onclick="location.href='character.html'" class="action-btn"
                    style="background-color: #a29bfe; box-shadow: 0 4px 0 #6c5ce7; color: white;">🧚‍♀️ 캐릭터 꾸미기</button>
                <button onclick="location.href='egg.html'" class="action-btn"
                    style="background-color: #ffda79; box-shadow: 0 4px 0 #cc8e35; color: #2d3436;">🍳 계란 만들기</button>
                <button onclick="location.href='tower.html'" class="action-btn"
                    style="background-color: #0b2242; box-shadow: 0 4px 0 #1e3c72; color: #fca311;">🗼 레서판다 타워</button>
                <button onclick="location.href='hot_egg.html'" class="action-btn"
                    style="background-color: #ff9f43; box-shadow: 0 4px 0 #cc8e35; color: white;">🥚 뜨거운 계란</button>
                <button onclick="location.href='peel_egg.html'" class="action-btn"
                    style="background-color: #f5f6fa; box-shadow: 0 4px 0 #dcdde1; color: #2f3640;">🐣 계란 까기</button>
                <button onclick="location.href='rice.html'" class="action-btn"
                    style="background-color: #d1d8e0; box-shadow: 0 4px 0 #a5b1c2; color: #4b6584;">🍚 밥 만들기</button>
                <button onclick="location.href='malatang.html'" class="action-btn"
                    style="background-color: #ff4757; box-shadow: 0 4px 0 #ff6b81; color: white;">🍲 마라탕 만들기</button>
                <button onclick="location.href='song.html'" class="action-btn"
                    style="background-color: #a29bfe; box-shadow: 0 4px 0 #6c5ce7; color: white;">🎵 노래 맞추기</button>
                <button onclick="location.href='bamboo.html'" class="action-btn"
                    style="background-color: #2ed573; box-shadow: 0 4px 0 #20bf6b; color: white;">🎋 황금 대나무</button>
                <button onclick="location.href='donkey.html'" class="action-btn"
                    style="background-color: #f39c12; box-shadow: 0 4px 0 #d35400; color: white;">🫏 당나귀 아르바이트</button>
                <button onclick="location.href='pig.html'" class="action-btn"
                    style="background-color: #ffb8b8; box-shadow: 0 4px 0 #ff9ff3; color: white;">🐷 돼지 키우기</button>
                <button onclick="location.href='jump.html'" class="action-btn"
                    style="background-color: #74b9ff; box-shadow: 0 4px 0 #0984e3; color: white;">☁️ 구름 점프맵</button>
                <button onclick="location.href='farm.html'" class="action-btn"
                    style="background-color: #2ed573; box-shadow: 0 4px 0 #20bf6b; color: white;">👩‍🌾 농장 가꾸기</button>
                <button onclick="location.href='giftbox.html'" class="action-btn"
                    style="background-color: #f78fb3; box-shadow: 0 4px 0 #c44569; color: white;">🎁 선물 상자</button>
                <button onclick="location.href='adopt.html'" class="action-btn"
                    style="background-color: #ff9a9e; box-shadow: 0 4px 0 #ee7a7e; color: white; font-weight: bold;">🐾
                    입양 하세요!</button>
                <button onclick="location.href='../morning_bread.html'" class="action-btn"
                    style="background-color: #ffcc80; box-shadow: 0 4px 0 #e67e22; color: #5d4037; font-weight: bold;">🍞
                    모닝빵 만들기</button>
                <button id="clearBtn" class="action-btn">🗑️ 다 지우기</button>
                <button id="saveBtn" class="action-btn">💾 사진 저장하기</button>
            </div>
        </header>

        <main class="main-content">
            <aside class="sidebar">
                <div class="panel">
                    <h2>도구 창고</h2>
                    <div class="tool-list">
                        <!-- 물감, 크레파스, 지우개 도구들 -->
                        <button class="tool-btn active" data-tool="fill" title="물감 붓기">🪣 물감 붓기</button>
                        <button class="tool-btn" data-tool="brush" title="직접 그리기">🖍️ 크레파스</button>
                        <button class="tool-btn" data-tool="eraser" title="지우개">🧽 지우개</button>
                    </div>
                </div>

                <div class="panel">
                    <h2>예쁜 색깔들</h2>
                    <div class="color-palette" id="colorPalette">
                        <!-- 자바스크립트가 여기에 물감을 준비해줄 거야! -->
                    </div>
                </div>
            </aside>

            <section class="canvas-area">
                <div class="canvas-wrapper">
                    <!-- 진짜 스케치북 역할을 하는 캔버스! -->
                    <canvas id="coloringCanvas" width="800" height="600"></canvas>
                </div>

                <div class="templates-panel">
                    <h2>밑그림 고르기</h2>
                    <div class="templates-list">
                        <!-- 밑그림들 -->
                        <img src="assets/dinosaur.png" alt="공룡" class="template-thumb active"
                            data-src="assets/dinosaur.png">
                        <img src="assets/car.png" alt="자동차" class="template-thumb" data-src="assets/car.png">
                        <div class="template-thumb" id="blankTemplate">📄 빈 도화지</div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <!-- 자바스크립트 요정 부르기 -->
    <script src="script.js"></script>
</body>

</html>
